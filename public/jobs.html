<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Jobs · TT TaskFinder</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="Jobs.css">
    <link rel="stylesheet" href="/components/navbar.css">
</head>

<body>
    <div id="navbar"></div>

    <div class="page-header">
        <p class="eyebrow">Trinidad & Tobago</p>
        <h1>Browse <span>Available</span> Tasks</h1>
        <p class="sub">Browse all open jobs and sign up when you're ready to apply.</p>
    </div>

    <div class="controls">
        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search by title, location or category…">
            <button onclick="filterJobs()">Search</button>
        </div>

        <div class="categories">
            <span class="active" onclick="setCategory('All', this)">All</span>
            <span onclick="setCategory('Cleaning', this)">🧹 Cleaning</span>
            <span onclick="setCategory('Delivery', this)">📦 Delivery</span>
            <span onclick="setCategory('Gardening', this)">🌿 Gardening</span>
            <span onclick="setCategory('Tech', this)">💻 Tech</span>
            <span onclick="setCategory('Handyman', this)">🔧 Handyman</span>
            <span onclick="setCategory('Tutoring', this)">📚 Tutoring</span>
            <span onclick="setCategory('Other', this)">✦ Other</span>
        </div>
    </div>

    <div class="meta-row">
        <span><strong id="jobCount">0</strong> jobs found</span>

        <select id="sortSelect" onchange="filterJobs()">
            <option value="newest">Newest First</option>
            <option value="pay_high">Highest Pay</option>
            <option value="pay_low">Lowest Pay</option>
        </select>
    </div>

    <div class="jobs-grid" id="jobsGrid">
        <p style="color:#aaa;font-size:0.85rem;padding:1rem 0;">Loading jobs…</p>
    </div>

    <footer style="text-align:center;padding:1.5rem;font-size:0.78rem;color:#aaa;border-top:1px solid #eee;">
        © 2026 TaskFinder TT · Find help, fast.
    </footer>

    <script type="module">
        import { loadNavbar } from "./js/navbar.js";
        import { JOB_LISTING } from "./js/API-jobs.js";
        import { db } from "./firebase/firebaseConfig.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        loadNavbar();

        let allJobs = [];
        let activeCategory = "All";

        // ---------------- NORMALIZE JOB ----------------
        function normalizeJob(job) {
            return {
                id: job.id,
                title: job.title || "",
                description: job.description || "",
                category: job.category || "Other",
                location: job.location || "Unknown",
                pay: Number(job.pay || 0),
                poster: job.poster || job.taskerName || "User",
                postedAt: job.postedAt || job.createdAt || new Date()
            };
        }

        // ---------------- RENDER ----------------
        function renderJobs(jobs) {

            const grid = document.getElementById("jobsGrid");
            const countEl = document.getElementById("jobCount");

            countEl.textContent = jobs.length;

            if (!jobs.length) {
                grid.innerHTML = `<div class="empty-state">No jobs found.</div>`;
                return;
            }

            let html = "";

            jobs.forEach(job => {

                const postedDate =
                    job.postedAt instanceof Date
                        ? job.postedAt
                        : new Date(job.postedAt);

                const daysAgo = Math.floor((Date.now() - postedDate) / 86400000);

                const timeLabel =
                    daysAgo === 0 ? "Today" :
                        daysAgo === 1 ? "Yesterday" :
                            `${daysAgo}d ago`;

                html += `
                    <div class="job-card">

                        <div class="card-top">
                            <span class="category-badge">${job.category}</span>
                            <div class="pay-amount">$${job.pay} <small>TTD</small></div>
                        </div>

                        <div class="job-title">${job.title}</div>
                        <div class="job-desc">${job.description}</div>

                        <div class="card-meta">
                            <span>📍 ${job.location}</span>
                            <span>🕐 ${timeLabel}</span>
                        </div>

                        <div class="card-footer">
                            <span class="poster">Posted by ${job.poster}</span>
                            <a class="view-btn" href="job-detail.html?id=${job.id}">
                                View Details
                            </a>
                        </div>

                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        // ---------------- LOAD JOBS ----------------
        async function getJobs() {

            let firebaseJobs = [];

            try {
                const snapshot = await getDocs(collection(db, "jobs"));

                firebaseJobs = snapshot.docs.map(doc => {
                    const data = doc.data();

                    return normalizeJob({
                        id: doc.id,
                        ...data,
                        postedAt: data.createdAt?.toDate() // 🔥 correct field
                    });
                });

                console.log("🔥 Firestore jobs:", firebaseJobs);

            } catch (err) {
                console.log("Firestore failed:", err);
            }

            // normalize API jobs too
            const apiJobs = JOB_LISTING.map(job => normalizeJob(job));

            // MERGE BOTH
            allJobs = [...apiJobs, ...firebaseJobs];

            filterJobs();
        }

        // ---------------- FILTER ----------------
        function filterJobs() {

            const searchVal = document.getElementById("searchInput").value.toLowerCase();
            const sortVal = document.getElementById("sortSelect").value;

            let filtered = allJobs.filter(job => {

                const matchCategory =
                    activeCategory === "All" ||
                    job.category.toLowerCase() === activeCategory.toLowerCase();

                const matchSearch =
                    job.title.toLowerCase().includes(searchVal) ||
                    job.category.toLowerCase().includes(searchVal) ||
                    job.location.toLowerCase().includes(searchVal);

                return matchCategory && matchSearch;
            });

            // SORT
            if (sortVal === "pay_high") {
                filtered.sort((a, b) => b.pay - a.pay);
            }
            else if (sortVal === "pay_low") {
                filtered.sort((a, b) => a.pay - b.pay);
            }
            else {
                filtered.sort((a, b) => new Date(b.postedAt) - new Date(a.postedAt));
            }

            renderJobs(filtered);
        }

        // ---------------- CATEGORY ----------------
        function setCategory(cat, el) {

            activeCategory = cat;

            document.querySelectorAll(".categories span")
                .forEach(s => s.classList.remove("active"));

            el.classList.add("active");

            filterJobs();
        }

        // ---------------- EVENTS ----------------
        document.getElementById("searchInput")
            .addEventListener("keyup", filterJobs);

        window.filterJobs = filterJobs;
        window.setCategory = setCategory;

        // INIT
        getJobs();

    </script>

</body>

</html>
