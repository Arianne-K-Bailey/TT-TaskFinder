<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - TT TaskFinder</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="profile.css">
  <link rel="stylesheet" href="/components/navbar.css">
</head>

<body>
  <div id="navbar"></div>

  <div class="container">

    <div class="header">
      <div>
        <h1>My Profile</h1>
        <p style="margin:0;color:#64748b;">Manage your account and activity</p>
      </div>

      <div class="toggle">
        <button id="workerBtn" class="active" onclick="setMode('worker')">Taskee</button>
        <button id="clientBtn" onclick="setMode('client')">Tasker</button>
      </div>
    </div>

    <div class="grid">

      <!-- PROFILE CARD -->
      <div class="card center">
        <div class="avatar">👤</div>

        <h3 id="username">Loading...</h3>
        <p id="email">Loading...</p>

        <p>⭐ 4.8 • 47 jobs completed</p>

        <hr>

        <p id="phone">Loading...</p>

        <hr>

        <h4>Skills</h4>
        <p>Lawn Care • Repairs • Cleaning • Tech Support</p>

        <button class="btn" style="width:100%;">Edit Profile</button>
      </div>

      <!-- JOBS CARD -->
      <div class="card">

        <!-- TOGGLES INSIDE CARD -->
        <div class="tabs">
          <button id="tab1" class="active" onclick="showTab('main')">Active Jobs</button>
          <button id="tab2" onclick="showTab('saved')">Saved</button>
        </div>

        <!-- TASKEE VIEW -->
        <div id="workerView">

          <h4>Taskee (Jobs You Accepted)</h4>
          <div id="taskeeJobs"></div>

        </div>

        <!-- TASKER VIEW -->
        <div id="clientView" style="display:none;">

          <h4>Tasker (Jobs You Posted)</h4>
          <div id="taskerJobs"></div>

          <button onclick="window.location.href='post-job.html'" class="btn">+ Post New Job</button>

        </div>

        <!-- SAVED TAB -->
        <div id="saved" style="display:none;">
          <p>No saved tasks yet.</p>
        </div>

      </div>

    </div>
  </div>

  <script type="module">
    import { loadNavbar } from "./js/navbar.js";

    window.addEventListener("DOMContentLoaded", () => {
      loadNavbar();
    });
  </script>

  <script type="module" src="./js/profile.js"></script>

</body>

</html>
